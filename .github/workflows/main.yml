name: Build EXE

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: 使用 Node 18（稳定）
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 安装依赖
        run: npm install

      - name: 安装打包工具
        run: npm install electron-builder --save-dev

      - name: 打包 EXE
        run: npx electron-builder --win

      - name: 上传 EXE
        uses: actions/upload-artifact@v4
        with:
          name: exe
          path: dist/
